name: Bug report
description: Report a reproducible defect in the library or showcase.
title: "bug: "
labels:
  - type:bug
body:
  - type: markdown
    attributes:
      value: |
        For sensitive vulnerabilities, do not use this form. Follow `SECURITY.md` instead.
  - type: checkboxes
    id: search
    attributes:
      label: Existing issue check
      options:
        - label: I searched existing issues and docs first
          required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Steps, sample code, or screen flow to reproduce.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Version and target
      description: Library version, Kotlin/Compose version, and affected platform.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - semantic runtime API
        - compatibility API
        - presets or registry
        - platform adapter
        - diagnostics
        - showcase app
        - documentation
        - other
    validations:
      required: true
  - type: dropdown
    id: accessibility-impact
    attributes:
      label: Accessibility or reduced-motion impact
      options:
        - none known
        - affects Full only
        - affects Reduced
        - affects Off
        - affects multiple levels
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, screenshots, test failures, or additional notes.
  - type: checkboxes
    id: conduct
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
