name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew allTests --max-workers=2
      - run: ./gradlew koverVerify

  publish:
    needs: check
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Publish
        env:
          CANIMATION_MAVEN_URL: ${{ secrets.CANIMATION_MAVEN_URL }}
          CANIMATION_MAVEN_USERNAME: ${{ secrets.CANIMATION_MAVEN_USERNAME }}
          CANIMATION_MAVEN_PASSWORD: ${{ secrets.CANIMATION_MAVEN_PASSWORD }}
          CANIMATION_SIGNING_KEY: ${{ secrets.CANIMATION_SIGNING_KEY }}
          CANIMATION_SIGNING_PASSWORD: ${{ secrets.CANIMATION_SIGNING_PASSWORD }}
          CANIMATION_SIGNING_KEY_ID: ${{ secrets.CANIMATION_SIGNING_KEY_ID }}
        run: ./gradlew publish
