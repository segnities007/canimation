name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up build environment
        uses: ./.github/actions/setup-build
      - name: Run release checks
        run: |
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          ./gradlew allTests releaseReadiness -Pversion="$RELEASE_VERSION" --max-workers=2 --no-daemon
      - name: Run repository audits
        run: |
          bash scripts/security-audit.sh
          bash scripts/validate-workflows.sh

  publish:
    needs: check
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up build environment
        uses: ./.github/actions/setup-build
      - name: Check release secrets
        env:
          CANIMATION_MAVEN_URL: ${{ secrets.CANIMATION_MAVEN_URL }}
          CANIMATION_MAVEN_USERNAME: ${{ secrets.CANIMATION_MAVEN_USERNAME }}
          CANIMATION_MAVEN_PASSWORD: ${{ secrets.CANIMATION_MAVEN_PASSWORD }}
          CANIMATION_SIGNING_KEY: ${{ secrets.CANIMATION_SIGNING_KEY }}
          CANIMATION_SIGNING_PASSWORD: ${{ secrets.CANIMATION_SIGNING_PASSWORD }}
          CANIMATION_SIGNING_KEY_ID: ${{ secrets.CANIMATION_SIGNING_KEY_ID }}
        run: |
          test -n "$CANIMATION_MAVEN_URL"
          test -n "$CANIMATION_MAVEN_USERNAME"
          test -n "$CANIMATION_MAVEN_PASSWORD"
          test -n "$CANIMATION_SIGNING_KEY"
          test -n "$CANIMATION_SIGNING_PASSWORD"
          test -n "$CANIMATION_SIGNING_KEY_ID"
      - name: Publish
        env:
          CANIMATION_MAVEN_URL: ${{ secrets.CANIMATION_MAVEN_URL }}
          CANIMATION_MAVEN_USERNAME: ${{ secrets.CANIMATION_MAVEN_USERNAME }}
          CANIMATION_MAVEN_PASSWORD: ${{ secrets.CANIMATION_MAVEN_PASSWORD }}
          CANIMATION_SIGNING_KEY: ${{ secrets.CANIMATION_SIGNING_KEY }}
          CANIMATION_SIGNING_PASSWORD: ${{ secrets.CANIMATION_SIGNING_PASSWORD }}
          CANIMATION_SIGNING_KEY_ID: ${{ secrets.CANIMATION_SIGNING_KEY_ID }}
        run: |
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          ./gradlew publish -Pversion="$RELEASE_VERSION" --no-daemon
      - name: Archive publication artifacts
        run: |
          mkdir -p build/release-artifacts
          cp -R */build/publications build/release-artifacts/publications 2>/dev/null || true
      - name: Upload publication artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-publications
          path: build/release-artifacts
          retention-days: 14
      - name: Attest publication provenance
        uses: actions/attest-build-provenance@1db698b7e6b0fb53b5c9d7f4225d1b5ee8b0f4ef # v2
        with:
          subject-path: build/release-artifacts/**
