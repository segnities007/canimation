name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-build
      - name: Log build start
        run: date -u '+%Y-%m-%dT%H:%M:%SZ'
      - name: Compile Wasm production executable
        run: ./gradlew :composeApp:compileProductionExecutableKotlinWasmJsOptimize --info
      - name: Bundle production webpack output
        run: ./gradlew :composeApp:jsBrowserProductionWebpack --info
      - name: Assemble Wasm browser distribution
        run: ./gradlew :composeApp:wasmJsBrowserDistribution --info
      - name: Log build end
        if: always()
        run: date -u '+%Y-%m-%dT%H:%M:%SZ'
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: composeApp/build/dist/wasmJs/productionExecutable

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
