name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: CI / lint
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up build environment
        uses: ./.github/actions/setup-build
      - name: Run lint
        run: ./gradlew lint --max-workers=2 --no-daemon

  test:
    name: CI / test
    needs:
      - audit
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up build environment
        uses: ./.github/actions/setup-build
      - name: Run all tests
        run: ./gradlew allTests --max-workers=2 --no-daemon
      - name: Generate coverage reports
        run: ./gradlew :koverHtmlReport :koverXmlReport --max-workers=2 --no-daemon
      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: test-results
          path: '**/build/reports/tests/'
          retention-days: 7
      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage-report
          path: |
            build/reports/kover/html/
            build/reports/kover/report.xml
          retention-days: 7

  build:
    name: CI / build
    needs:
      - test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up build environment
        uses: ./.github/actions/setup-build
      - name: Run build checks
        run: ./gradlew compileLibraryAndroid compileLibraryJvm :androidApp:assembleDebug :composeApp:compileKotlinJvm --max-workers=2 --no-daemon

  build-apple:
    name: CI / build-apple
    needs:
      - test
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up build environment
        uses: ./.github/actions/setup-build
      - name: Run Apple platform build checks
        run: ./gradlew compileLibraryApple :composeApp:packageDistributionForCurrentOS :composeApp:linkDebugFrameworkIosSimulatorArm64 --max-workers=2 --no-daemon

  wasm-build:
    name: CI / wasm-build
    needs:
      - test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up build environment
        uses: ./.github/actions/setup-build
      - name: Run Wasm build checks
        run: ./gradlew compileLibraryWeb :composeApp:compileKotlinWasmJs --max-workers=2 --no-daemon

  check:
    name: CI / check
    needs:
      - build
      - build-apple
      - wasm-build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up build environment
        uses: ./.github/actions/setup-build
      - name: Run release readiness checks
        run: ./gradlew releaseReadiness --max-workers=2 --no-daemon

  audit:
    name: CI / audit
    needs:
      - lint
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up build environment
        uses: ./.github/actions/setup-build
      - name: Run security audit
        run: bash scripts/security-audit.sh
      - name: Validate workflow shape
        run: bash scripts/validate-workflows.sh
      - name: Validate governance docs
        run: bash scripts/validate-governance-docs.sh
      - name: Upload audit evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: audit-evidence
          path: |
            docs/quality/workflow/governance-docs-validation-report.json
            docs/quality/security/security-audit-report.json
            docs/quality/workflow/workflow-validation-report.json
          retention-days: 7
