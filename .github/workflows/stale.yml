name: Stale Management

on:
  schedule:
    - cron: '0 8 * * 4'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: stale-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  stale:
    runs-on: ubuntu-24.04
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Mark stale items
        uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9.1.0
        with:
          stale-issue-message: 'This issue has been marked stale due to inactivity. If this is still relevant, add context or a current reproduction and it will remain open.'
          stale-pr-message: 'This pull request has been marked stale due to inactivity. If work is continuing, add an update and it will remain open.'
          close-issue-message: 'Closing due to inactivity. Reopen or create a fresh issue with current context if the problem still exists.'
          close-pr-message: 'Closing due to inactivity. Reopen or create a fresh pull request if work resumes.'
          days-before-stale: 45
          days-before-close: 14
          exempt-issue-labels: 'type:security,status:accepted'
          exempt-pr-labels: 'status:blocked'
