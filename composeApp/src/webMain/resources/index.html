<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="canimation — Accessible animation library for Compose Multiplatform">
    <title>canimation — Compose Multiplatform Animation Library</title>
    <link type="text/css" rel="stylesheet" href="styles.css">
</head>
<body>
<div id="loading">
    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 50 50" role="presentation">
        <circle cx="25" cy="25" r="20" stroke="#e0e0e0" stroke-width="4" fill="none"/>
        <circle cx="25" cy="25" r="20" stroke="#6750A4" stroke-width="4" fill="none" stroke-linecap="round"
                stroke-dasharray="90 125">
            <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s"
                              repeatCount="indefinite"/>
        </circle>
    </svg>
</div>
<script type="application/javascript" src="composeApp.js"></script>
</body>
</html>
